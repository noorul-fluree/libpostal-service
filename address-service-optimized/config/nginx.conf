worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
    use epoll;
    multi_accept on;
}

http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 10000;
    types_hash_max_size 2048;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Gzip compression
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 256;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=5000r/s;

    # Upstream: address service instances
    upstream address_backend {
        least_conn;
        keepalive 256;

        server address-service:8080 max_fails=3 fail_timeout=30s;
        # Add more instances for horizontal scaling:
        # server address-service-2:8080 max_fails=3 fail_timeout=30s;
        # server address-service-3:8080 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name _;

        # Max request body (for batch endpoint)
        client_max_body_size 10m;

        # API endpoints
        location /api/v1/ {
            limit_req zone=api burst=1000 nodelay;

            proxy_pass http://address_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Timeouts for batch processing
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 120s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 32k;
        }

        # Health endpoints (no rate limit)
        location /health/ {
            proxy_pass http://address_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Metrics (restrict to internal)
        location /metrics {
            # Allow internal monitoring only
            # allow 10.0.0.0/8;
            # allow 172.16.0.0/12;
            # deny all;

            proxy_pass http://address_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Status page
        location /nginx_status {
            stub_status on;
            # allow 127.0.0.1;
            # deny all;
        }
    }
}
